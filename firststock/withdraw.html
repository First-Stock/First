<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Withdraw — First Stock</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <div class="card">
      <header class="card-header">
        <img class="logo" src="logo.svg" alt="First Stock logo" />
        <div class="brand">
          <h1>Withdraw</h1>
          <p class="tag">Enter amount to withdraw</p>
        </div>
      </header>

      <form id="withdrawForm">
        <div class="row">
          <label for="amount">Amount (max available)</label>
          <input id="amount" name="amount" type="number" step="0.01" min="0" required />
          <div style="margin-top:6px;color:var(--muted);font-size:13px">Minimum withdrawal: ₦1,000</div>
        </div>
        <div class="row">
          <button type="submit" class="btn">Confirm Withdraw</button>
          <a href="dashboard.html" class="btn" style="background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--muted);margin-left:8px;">Cancel</a>
        </div>
      </form>

      <section style="margin-top:18px">
        <h4 style="margin:0 0 8px 0">Destination bank account</h4>
        <div style="background:rgba(255,255,255,0.02);padding:12px;border-radius:10px">
          <p id="noBankMsg" style="color:var(--muted);margin:0">Loading bank details...</p>
          <p id="bankDetails" style="display:none;margin:0">
            <strong>Account name:</strong> <span id="accountName">—</span><br>
            <strong>Account number:</strong> <span id="accountNumber">—</span><br>
            <strong>Bank:</strong> <span id="bankName">—</span>
          </p>
        </div>
        <div style="margin-top:10px">
          <a href="bank-settings.html" class="btn" style="background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--muted);">Add / Edit my bank details</a>
        </div>
      </section>

    </div>
  </main>

  <div id="toast" class="toast" aria-live="polite"></div>
  <script src="withdraw.js"></script>
</body>
</html>
